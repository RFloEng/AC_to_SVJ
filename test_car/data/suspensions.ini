; Geometry pickups - AC axes (Y-up, Z-forward), metres.
; WBCAR_* X component is an inboard-positive offset from the wheel centre
; (same convention as WBTYRE_*): X=0.38 means "0.38 m inboard of wheel centre".
; Absolute lateral position in vehicle frame = half_track - X.
; Upper X must be SMALLER than lower X so that the upper inboard mount is
; farther from the car centreline, giving the correct DWB V-shape in front view.
